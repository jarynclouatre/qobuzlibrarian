services:
  qobuz-librarian:
    image: dinkeyes/qobuz-librarian:latest
    container_name: qobuz-librarian
    restart: unless-stopped
    # Run an init (tini) as PID 1 to reap orphaned processes. The app is the
    # container's main process, and when a download is cancelled or times out
    # it kills streamrip's process group; without an init to harvest them,
    # any children left behind would linger as zombies for the container's
    # whole life.
    init: true
    mem_limit: 1g
    pids_limit: 256
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    ports:
      # WEB_PORT (from .env) only changes the host-side mapping; the
      # container always listens on 8666 internally.
      - "${WEB_PORT:-8666}:8666"

    environment:
      # ── User / permissions ────────────────────────────────────────────────
      # The app runs as PUID:PGID (default 1000:1000) so downloaded and
      # imported files aren't root-owned. Set these to match the host user
      # that owns your media — find your values with `id -u` / `id -g` — by
      # putting PUID/PGID in .env. PUID=0 PGID=0 runs as root if you need it.
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"

      # ── Auth ──────────────────────────────────────────────────────────────
      # Optional: set QOBUZ_USER_AUTH_TOKEN / QOBUZ_USER_ID in .env, or just
      # use the Settings page in the web UI. Empty = use the Settings page.
      QOBUZ_USER_AUTH_TOKEN: "${QOBUZ_USER_AUTH_TOKEN:-}"
      QOBUZ_USER_ID:         "${QOBUZ_USER_ID:-}"
      # To keep the token out of the container environment (and `docker
      # inspect`), point this at a file holding just the token — e.g. a Docker
      # secret — instead of setting QOBUZ_USER_AUTH_TOKEN above:
      #   QOBUZ_USER_AUTH_TOKEN_FILE: /run/secrets/qobuz_token
      # (add the matching `secrets:` block + a top-level `secrets:` definition).
      QOBUZ_USER_AUTH_TOKEN_FILE: "${QOBUZ_USER_AUTH_TOKEN_FILE:-}"

      # ── Paths ─────────────────────────────────────────────────────────────
      MUSIC_ROOT:           /music
      STAGING_DIR:          /staging
      DATA_DIR:             /data
      UPGRADE_BACKUP_DIR:   /upgrade_backups
      # One-time Migrate tool: source library + destination folder as seen
      # INSIDE the container. Mount both as volumes below, then set the matching
      # container paths in .env. Leave unset unless you're migrating.
      QL_MIGRATE_SRC:       "${QL_MIGRATE_SRC:-}"
      QL_MIGRATE_DEST:      "${QL_MIGRATE_DEST:-}"

      # beets (bundled — no separate container needed)
      BEETS_CONFIG_DIR:     /config/beets
      BEETS_DB_PATH:        /config/beets/musiclibrary.db
      BEETS_STAGING_INSIDE: /staging
      # Optional folder/file naming. Leave unset to use the fully-editable
      # /config/beets/config.yaml. beets path syntax ($albumartist, $album,
      # $year, $track, $title, ...).
      # BEETS_PATH_DEFAULT:   "$albumartist/$album ($year)/$track - $title"
      # BEETS_PATH_SINGLETON: "$albumartist/$album ($year)/$track - $title"
      # BEETS_PATH_COMP:      "Various Artists/$album ($year)/$track - $title"
      # Comma-separated list of beets plugins. Unset = honour /config/beets/
      # config.yaml (seeded with `fetchart` only). Useful extras: lastgenre,
      # replaygain, scrub, edit, embedart. Full list: https://beets.readthedocs.io/
      # BEETS_PLUGINS: "fetchart,lastgenre,replaygain"

      # streamrip config (generated on first run)
      STREAMRIP_CONFIG:     /config/streamrip/config.toml

      # ── Web UI ─────────────────────────────────────────────────────────────
      WEB_HOST: "0.0.0.0"
      WEB_PORT: "8666"
      # Login. Unset (or any value other than "none") = the UI prompts you to
      # set a username/password on first visit and requires sign-in after.
      # "none" turns the login off entirely — only safe on a trusted network or
      # behind your own authenticating reverse proxy.
      WEB_AUTH: "${WEB_AUTH:-}"
      # Optionally seed the login from .env instead of the first-visit setup
      # screen — provide BOTH (they also act as a password reset on restart).
      # Empty = use the setup screen. An env value is visible to `docker inspect`.
      WEB_AUTH_USER:     "${WEB_AUTH_USER:-}"
      WEB_AUTH_PASSWORD: "${WEB_AUTH_PASSWORD:-}"
      # Behind a reverse proxy, set this to the proxy's IP(s) so the failed-login
      # throttle keys on the real client IP instead of the shared proxy address.
      FORWARDED_ALLOW_IPS: "${FORWARDED_ALLOW_IPS:-127.0.0.1}"
      # Refuse downloads/scans at startup if /music or /staging aren't writable
      # by the container user (typical on a NAS with the wrong PUID/PGID).
      QL_CHECK_VOLUMES: "1"
      # Terminal-first mode: set QL_CLI_ONLY=1 in .env to start handed-off to
      # the CLI (web UI serves but its downloads stay paused). Empty = web app.
      # Or hand off case-by-case from Settings → Mode in the web UI.
      QL_CLI_ONLY: "${QL_CLI_ONLY:-}"
      # Optional: shell command run after every terminal job. The job state
      # (id/status/title/artist/error/finished_at) is piped to it as JSON on
      # stdin. Useful for desktop notifications, ntfy/Apprise, etc.
      # POST_JOB_HOOK: "curl -sX POST https://ntfy.sh/your-topic -d @-"

      # ── Qobuz API ─────────────────────────────────────────────────────────
      QOBUZ_API_BASE: https://www.qobuz.com/api.json/0.2
      QOBUZ_APP_ID:   "798273057"

      # ── Tuning (defaults are sensible; uncomment to override) ─────────────
      # RIP_TIMEOUT:               "900"   # per-album rip subprocess timeout (s)
      # DELAY_BETWEEN:             "1.0"   # pause between consecutive album downloads (s)
      # ARTIST_API_DELAY:          "0.0"   # pause between Qobuz API calls during library walks (s)
      # SEARCH_LIMIT:              "25"    # search results per query
      # ARTIST_CATALOG_LIMIT:      "1000"  # max albums fetched per artist
      # MISSING_ALBUMS_MIN_TRACKS: "4"     # hide singles / very short EPs in the missing-albums step

      # ── Download quality ──────────────────────────────────────────────────
      # streamrip quality: 2=CD/16-bit lossless, 3=24-bit ≤96kHz,
      # 4=24-bit ≤192kHz. Default 4 = the highest quality Qobuz has per release.
      # Set "2" for CD lossless if you'd rather have smaller files.
      STREAMRIP_QUALITY: "${STREAMRIP_QUALITY:-4}"

      # ── Lyrics ────────────────────────────────────────────────────────────
      # Synced lyrics are fetched on every import by default. Set "false" to
      # disable. LYRICS_FORMAT: embed = FLAC tag · sidecar = .lrc · both.
      # LYRICS_PROVIDERS: comma list in preferred order; empty = built-in.
      LYRICS_ENABLED: "${LYRICS_ENABLED:-true}"
      LYRICS_FORMAT: "${LYRICS_FORMAT:-embed}"
      LYRICS_PROVIDERS: "${LYRICS_PROVIDERS:-}"

      # ── Behaviour (also editable on the Settings page) ────────────────────
      # Pick the hi-res master when an album has multiple versions.
      PREFER_HIRES: "${PREFER_HIRES:-true}"
      # After import, merge sibling/duplicate album folders. CLI-only and
      # prompts per folder; off by default (it moves folders). Set "true"
      # if you want it offered on CLI runs.
      CONSOLIDATE: "${CONSOLIDATE:-false}"
      # Move "Primary, Other/<album>" into "Primary/<album>" after import.
      MIGRATE_MULTI_ARTIST: "${MIGRATE_MULTI_ARTIST:-false}"
      # Cover art placement: sidecar (image beside tracks) | embed | both.
      ARTWORK: "${ARTWORK:-sidecar}"

      # ── New releases ──────────────────────────────────────────────────────
      # First launch auto-runs a library scan — it lists your missing albums
      # AND establishes the new-release baseline (resuming if interrupted).
      # "false" skips the automatic scan; a manual library scan still seeds it.
      AUTO_LIBRARY_SCAN: "${AUTO_LIBRARY_SCAN:-true}"
      # Auto-check for new releases by your library's artists this often
      # (seconds), surfaced on the dashboard once the baseline's set. 0 = off.
      # Also tunable on the Settings page.
      NEW_RELEASE_CHECK_INTERVAL: "${NEW_RELEASE_CHECK_INTERVAL:-86400}"
      # How long (seconds) a gap scan reuses a fetched discography before
      # re-fetching. The new-release check always fetches fresh regardless.
      ARTIST_CATALOG_CACHE_TTL: "${ARTIST_CATALOG_CACHE_TTL:-604800}"

      # ── Optional features (off by default) ────────────────────────────────
      # Offer quality upgrades during ordinary gap-fill walks. The explicit
      # Upgrade walk works regardless of this; this only affects normal walks.
      AUTO_UPGRADE_ENABLED: "${AUTO_UPGRADE_ENABLED:-false}"
      UPGRADE_BACKUP_RETENTION_DAYS: "${UPGRADE_BACKUP_RETENTION_DAYS:-7}"
      # Let the Upgrade walk also re-rip tracks grabbed as singles (off = leave
      # deliberate one-off singles alone).
      UPGRADE_SINGLES_ENABLED: "${UPGRADE_SINGLES_ENABLED:-false}"
      # How long (days) to remember that Qobuz delivered a partial hi-res for
      # an album before retrying it in the upgrade walk.
      # CAPPED_RETENTION_DAYS: "90"
      # Downsample hi-res FLACs to 44.1/48 kHz before import to save space.
      # Leave false to keep whatever Qobuz delivers (CD quality is fine).
      DOWNSAMPLE_HIRES_ENABLED: "${DOWNSAMPLE_HIRES_ENABLED:-false}"

      # ── Matching thresholds (advanced; defaults are well-tested) ──────────
      # Similarity score (0–1) for fuzzy directory-name matching.
      # Lower = more permissive, more false positives.
      # FUZZY_DIR_THRESH:           "0.78"
      # ARTIST_NAME_THRESH:         "0.85"
      # ARTIST_DIR_MATCH_THRESH:    "0.65"
      # DB_ALBUM_THRESH:            "0.85"
      # CONSOLIDATE_THRESH:         "0.70"
      # AUTO_SAFE_TITLE_SIM_THRESH: "0.85"

      # ── Advanced overrides (defaults match the app; change via .env) ──────
      # beets import guard: seconds of no-output before a stalled import is
      # killed and quarantined, retry count, and pause between attempts.
      BEETS_TIMEOUT:         "${BEETS_TIMEOUT:-600}"
      BEETS_MAX_ATTEMPTS:    "${BEETS_MAX_ATTEMPTS:-2}"
      BEETS_RETRY_PAUSE:     "${BEETS_RETRY_PAUSE:-30}"
      # Polite-API cooldown (seconds) after Qobuz rate-limits us.
      RATE_LIMIT_COOLDOWN:   "${RATE_LIMIT_COOLDOWN:-30}"
      # Parallel ffmpeg workers for the on-demand downsample (CPU-bound).
      RESAMPLE_WORKERS:      "${RESAMPLE_WORKERS:-4}"
      # Log verbosity: DEBUG | INFO | WARNING | ERROR.
      LOG_LEVEL:             "${LOG_LEVEL:-INFO}"
      # Optional command run after every job (job state as JSON on stdin);
      # POST_JOB_HOOK_TIMEOUT caps a slow webhook.
      POST_JOB_HOOK:         "${POST_JOB_HOOK:-}"
      POST_JOB_HOOK_TIMEOUT: "${POST_JOB_HOOK_TIMEOUT:-10}"

      # ── Web request budgets ───────────────────────────────────────────────
      # Per-request timeout (seconds) for the web UI's Qobuz API calls.
      # WEB_FETCH_TIMEOUT bounds album/track fetches and the search box;
      # WEB_TEST_AUTH_TIMEOUT bounds the startup + Settings token probe.
      QL_WEB_FETCH_TIMEOUT:     "${QL_WEB_FETCH_TIMEOUT:-12.0}"
      QL_WEB_TEST_AUTH_TIMEOUT: "${QL_WEB_TEST_AUTH_TIMEOUT:-8.0}"

    volumes:
      # Host paths come from a .env file (see .env.example). Defaults to
      # ./music, ./staging, ./upgrade_backups so a fresh clone runs as-is.
      # Music library (read-write so beets can move files in)
      - ${QL_MUSIC_DIR:-./music}:/music
      # Staging area for streamrip downloads
      - ${QL_STAGING_DIR:-./staging}:/staging
      # Persistent config: beets db, streamrip config, app state
      - qobuz-librarian-config:/config
      # App data: fetch log, queue persistence, repair log
      - qobuz-librarian-data:/data
      # Upgrade backups
      - ${QL_UPGRADE_BACKUPS:-./upgrade_backups}:/upgrade_backups

volumes:
  qobuz-librarian-config:
    name: qobuz-librarian-config
  qobuz-librarian-data:
    name: qobuz-librarian-data
