{% extends "base.html" %}
{% block title %}Search — Qobuz Librarian{% endblock %}
{% block content %}

<h1 class="text-2xl font-bold mb-4">Search Qobuz</h1>

{% if creds_ok %}
<div class="card bg-base-200 shadow mb-6">
  <div class="card-body">
    <form action="/search" method="post"
          hx-post="/search" hx-target="#results" hx-swap="innerHTML"
          hx-indicator="#search-spinner"
          class="flex flex-col gap-2">
      <input type="hidden" name="_csrf_token" value="{{ request.state.csrf_token }}">
      <div class="join self-center" role="group" aria-label="Search for">
          <label class="join-item btn btn-sm has-[:checked]:btn-primary">
            <input type="radio" name="kind" value="album" class="hidden" {% if kind != 'track' %}checked{% endif %}
                   hx-post="/search" hx-target="#results" hx-swap="innerHTML" hx-include="closest form">
            Albums
          </label>
          <label class="join-item btn btn-sm has-[:checked]:btn-primary">
            <input type="radio" name="kind" value="track" class="hidden" {% if kind == 'track' %}checked{% endif %}
                   hx-post="/search" hx-target="#results" hx-swap="innerHTML" hx-include="closest form">
            Tracks
          </label>
      </div>
      <div class="flex gap-2">
        <input type="text" name="q" value="{{ q or '' }}"
               aria-label="Search Qobuz"
               placeholder="{% if kind == 'track' %}Song or artist{% else %}Artist, album, or Qobuz URL{% endif %}"
               inputmode="search" enterkeyhint="search" autocapitalize="off" spellcheck="false" maxlength="500"
               class="input input-bordered flex-1" autocomplete="off" autofocus>
        <button type="submit" class="btn btn-primary gap-2">
          <span id="search-spinner" class="loading loading-spinner loading-sm htmx-indicator"></span>
          Search
        </button>
      </div>
    </form>
  </div>
</div>

<div id="results" aria-live="polite">
  {% include "_search_results.html" %}
</div>
{% else %}
<div class="alert alert-warning">
  <span>No Qobuz credentials set —
    <a href="/settings" class="link">set them in Settings</a> before searching.</span>
</div>
{% endif %}

{% endblock %}
