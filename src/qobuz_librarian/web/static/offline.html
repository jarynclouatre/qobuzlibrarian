<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — Qobuz Librarian</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1d232a;
      color: #a6adbb;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
    }
    .card {
      text-align: center;
      max-width: 380px;
      padding: 2.5rem 2rem;
    }
    h1 { font-size: 1.5rem; color: #2dd4bf; margin-bottom: 0.75rem; }
    p { line-height: 1.6; opacity: 0.75; }
    .retry-btn {
      display: inline-block;
      margin-top: 1.75rem;
      padding: 0.55rem 1.75rem;
      background: #2dd4bf;
      color: #08312a;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
    }
    .retry-btn:hover { background: #5eead4; }
    @media (prefers-color-scheme: light) {
      body { background: #ffffff; color: #4b5563; }
      h1 { color: #0d9488; }
      .retry-btn { background: #0d9488; color: #ffffff; }
      .retry-btn:hover { background: #0f766e; }
    }
  </style>
</head>
<body>
  <!-- Retry is a plain navigation to "/" (no JS): it works even though this
       page is served by the service worker while offline, and stays within the
       CSP (no inline handlers, no separate script that would itself need to be
       cached to function). Reaching the server again loads the real app. -->
  <div class="card">
    <h1>Qobuz Librarian</h1>
    <p>Can't reach the server.<br>Check that the Docker container is running.</p>
    <a href="/" class="retry-btn">Retry</a>
  </div>
</body>
</html>
