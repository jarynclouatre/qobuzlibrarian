name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Read-only — the test job never needs to mutate anything.
permissions:
  contents: read

# Run the bundled JS actions on Node 24 (pinned majors still ship Node 20,
# deprecated by GitHub mid-2026). GitHub's documented opt-in.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest -v --tb=short -rfE

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check src tests
