name: Docker

on:
  release:
    types: [published]
  workflow_dispatch:

# Reads the repo, writes to Docker Hub via secrets — no GitHub Packages
# writes here, so contents: read is enough.
permissions:
  contents: read

# Run the bundled JS actions on Node 24 (the pinned majors still ship
# Node 20, which GitHub deprecates mid-2026). This is GitHub's documented
# opt-in and avoids chasing per-action major bumps.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Serialise publishes so two runs never race to overwrite :latest; don't cancel
# an in-flight build, so a tagged image always finishes pushing.
concurrency:
  group: docker-release
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dinkeyes/qobuz-librarian
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
