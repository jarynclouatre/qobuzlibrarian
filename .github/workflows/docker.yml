name: Docker

on:
  release:
    types: [published]
  workflow_dispatch:

# Reads the repo, writes to Docker Hub via secrets — no GitHub Packages
# writes here, so contents: read is enough.
permissions:
  contents: read

# Run the bundled JS actions on Node 24 (the pinned majors still ship
# Node 20, which GitHub deprecates mid-2026). This is GitHub's documented
# opt-in and avoids chasing per-action major bumps.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Serialise publishes so two runs never race to overwrite :latest; don't cancel
# an in-flight build, so a tagged image always finishes pushing.
concurrency:
  group: docker-release
  cancel-in-progress: false

jobs:
  # Release gate. docker.yml is a separate workflow from test.yml, so a
  # cross-workflow `needs:` isn't possible — the checks live here and
  # build-and-push depends on them. This closes the gap where a published
  # release built and pushed an image with no test, lint, or smoke gate, so a
  # broken build/route/missing-tool could ship straight to users.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Tests
        run: python -m pytest -q

      - name: Lint
        run: ruff check src tests

      - name: Image smoke test (builds the image, boots it, checks routes + bundled tools)
        run: bash scripts/smoke_test.sh

  build-and-push:
    runs-on: ubuntu-latest
    needs: [verify]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Decide whether this release should move :latest. metadata-action's
      # latest=auto only checks the tag has no prerelease suffix — it does NOT
      # compare against other tags, so backfilling an old release (publishing
      # v0.5.1 after v0.7.0) would still clobber :latest with old code. Tag
      # :latest only when this release is the highest stable semver in the repo.
      - name: Is this the newest release?
        id: newest
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
          PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          # `|| true` so a repo with no stable vX.Y.Z tag yet (e.g. the first
          # release is a prerelease) doesn't abort the step under pipefail.
          highest=$(gh api --paginate "repos/$REPO/tags" --jq '.[].name' \
            | { grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true; } | sort -V | tail -1)
          if [ "$PRERELEASE" != 'true' ] && [ "$TAG" = "$highest" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$TAG highest=$highest prerelease=$PRERELEASE"

      - name: Extract version tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dinkeyes/qobuz-librarian
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ steps.newest.outputs.is_latest == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
