# Seeded once into the persistent config volume, then never overwritten —
# edit it freely. Full reference: https://beets.readthedocs.io/
library: /config/beets/musiclibrary.db
directory: /music

import:
  move: yes
  write: yes
  autotag: no
  quiet: yes
  timid: no
  incremental: no
  duplicate_action: merge

paths:
  default: $albumartist/$album ($year)/%if{$multidisc,Disc $disc/}$track - $title
  singleton: $albumartist/$album ($year)/$track - $title
  comp: Various Artists/$album ($year)/%if{$multidisc,Disc $disc/}$track - $title

plugins:
  - fetchart
  - inline

# A "Disc N" subfolder only when the album spans several discs; single-disc
# albums stay flat. beets has no built-in multi-disc flag, so the inline
# plugin derives one from disctotal.
item_fields:
  multidisc: 1 if disctotal and disctotal > 1 else 0

fetchart:
  auto: yes
  cautious: yes
  cover_names: [cover, folder, album, front, art]
  sources:
    - filesystem
