# Overlay config for fingerprint-tagging an existing untagged collection with
# AcoustID. Layer it on top of your normal beets config for one import run:
#
#   BEETSDIR=/config/beets \
#     beet -c /app/docker/beets-chroma.yaml import /music/<untagged-folder>
#
# It turns autotag on plus the chroma (AcoustID) and musicbrainz plugins for
# this run only, while inheriting your library path and file naming from
# /config/beets/config.yaml. Normal Qobuz downloads keep autotag OFF and are
# unaffected. chroma fingerprints each file and maps it to a MusicBrainz
# release via musicbrainz (without that plugin, AcoustID matches produce no
# candidates). AcoustID is not always right, so matches are reviewed
# interactively — accept, skip, or pick another candidate per album.
# Tags in place: write: yes updates the files where they are; move/copy: no
# means nothing is relocated, duplicated, or deleted. Reorganise later with
# `beet move` if you want library-style folders.
import:
  autotag: yes
  quiet: no
  timid: yes
  write: yes
  move: no
  copy: no
plugins: [chroma, musicbrainz]
